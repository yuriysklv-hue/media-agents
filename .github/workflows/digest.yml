name: Weekly Digest

on:
  schedule:
    # Воскресенье 21:00 MSK = 18:00 UTC
    - cron: '0 18 * * 0'
  workflow_dispatch:

# Нужно для шага «Commit data state»: дефолтный GITHUB_TOKEN иначе read-only
# и push состояния (seen_urls/published.jsonl) падает с 403.
permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
          GLM_FLASH_MODEL: ${{ secrets.GLM_FLASH_MODEL }}
          GLM_EMBEDDING_MODEL: ${{ secrets.GLM_EMBEDDING_MODEL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MEDIA_REPO: ${{ secrets.MEDIA_REPO }}
          MEDIA_SITE_SUBDIR: ${{ secrets.MEDIA_SITE_SUBDIR }}
        run: python run_digest.py

      - name: Commit data state
        run: |
          git config user.name "media-agents-bot"
          git config user.email "bot@media-agents"
          git add data/state/ data/published/
          git diff --staged --quiet || git commit -m "state: digest run $(date -u +%Y%m%d)"
          git pull --rebase origin main
          git push
