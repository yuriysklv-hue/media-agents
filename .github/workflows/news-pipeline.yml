name: News Pipeline

on:
  schedule:
    # 09:00 и 21:00 MSK (UTC+3) = 06:00 и 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
          GLM_FLASH_MODEL: ${{ secrets.GLM_FLASH_MODEL }}
          GLM_EMBEDDING_MODEL: ${{ secrets.GLM_EMBEDDING_MODEL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MEDIA_REPO: ${{ secrets.MEDIA_REPO }}
          MEDIA_SITE_SUBDIR: ${{ secrets.MEDIA_SITE_SUBDIR }}
        run: python run_pipeline.py

      # data/state/ и data/published/ коммитятся после каждого прогона —
      # это персистентность дедупликации между запусками на Actions.
      - name: Commit data state
        run: |
          git config user.name "media-agents-bot"
          git config user.email "bot@media-agents"
          git add data/state/ data/published/
          git diff --staged --quiet || git commit -m "state: pipeline run $(date -u +%Y%m%d-%H%M)"
          git pull --rebase origin main
          git push
