name: Spravochnik Pipeline

on:
  schedule:
    # Каждые 6 часов — 1 материал за прогон (4 материала/день)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Тестовый прогон: без PR в media и без коммита очереди'
        type: boolean
        default: false
      limit:
        description: 'Сколько материалов обработать за прогон'
        type: string
        default: '1'

# Нужно для шага «Commit queue state»: дефолтный GITHUB_TOKEN иначе read-only
# и push очереди (spravochnik_queue.yaml) падает с 403 (урок задачи 7).
permissions:
  contents: write

jobs:
  run-spravochnik:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spravochnik pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
          GLM_FLASH_MODEL: ${{ secrets.GLM_FLASH_MODEL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MEDIA_REPO: ${{ secrets.MEDIA_REPO }}
          MEDIA_SITE_SUBDIR: ${{ secrets.MEDIA_SITE_SUBDIR }}
        run: |
          python -m src.spravochnik.run \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            --limit "${{ inputs.limit || '1' }}"

      # Очередь (статусы review/published/needs_fix) коммитится обратно в main —
      # это персист состояния пайплайна между прогонами. В dry-run пропускается.
      - name: Commit queue state
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "media-agents-bot"
          git config user.email "bot@media-agents"
          git add config/spravochnik_queue.yaml data/state/ data/published/
          git diff --staged --quiet || git commit -m "spravochnik: queue state $(date -u +%Y%m%d-%H%M)"
          git pull --rebase origin main
          git push
