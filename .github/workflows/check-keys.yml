name: Проверка ключей (диагностика)

# Запускается только вручную кнопкой "Run workflow" — по расписанию не работает.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Проверить ключи LLM
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
          GLM_FLASH_MODEL: ${{ secrets.GLM_FLASH_MODEL }}
          GLM_EMBEDDING_MODEL: ${{ secrets.GLM_EMBEDDING_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/check_keys.py
