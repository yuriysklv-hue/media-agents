# Русское зеркало keywords.yaml для Pre-Filter (уровень 1: keyword scoring).
# Применяется к items с language: ru (см. pre_filter.py — выбор по языку).
#
# Схема, веса, пороги и механики exclusion/override — те же, что в keywords.yaml
# (см. src/utils/scoring.py). Отличается только набор слов.
#
# Морфология: matcher ищет слово по границам (\w), поэтому падежные формы —
# разные строки. Включаем частые словоформы + латинские бренды/термины
# (в русских текстах они не склоняются). Уровень 2 (GLM) добирает остальное:
# одного сильного попадания в заголовке (core=30 или платформа=20) достаточно
# для порога 20, поэтому список щедрый намеренно.

core_adtech:
  weight_in_title: 30
  weight_in_desc: 20
  keywords:
    - programmatic
    - программатик
    - программатика
    - программатике
    - DSP
    - SSP
    - RTB
    - ad exchange
    - рекламная биржа
    - retail media
    - ретейл медиа
    - ретейл-медиа
    - ритейл медиа
    - ритейл-медиа
    - CTV
    - OTT
    - таргетинг
    - таргетинга
    - таргетированная
    - медийная реклама
    - медийной рекламы
    - перформанс
    - атрибуция
    - атрибуции
    - measurement
    - приватность
    - приватности
    - куки
    - cookie
    - cookieless

