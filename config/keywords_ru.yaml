# Темы, которые отбрасываем даже при ненулевом скору (зеркало exclusions)
exclusions:
  - спортивная реклама
  - спорт-реклама
  - криптовалюта
  - крипта
  - гейминг
  - игровая реклама
  - казино
  - ставки на спорт
  - печатная реклама
  - наружная реклама
  - билборд

# Признак news roundup в заголовке (3+ semicolons)
roundup_semicolon_threshold: 3

# Ключевые слова, которые перепроверяют exclusion
override_keywords:
  - programmatic
  - программатик
  - DSP
  - SSP
  - retail media
  - ретейл медиа
  - CTV
  - digital out-of-home
  - DOOH

# Порог прохождения. НИЖЕ англоязычного (20) намеренно: русская морфология даёт
# меньше точных попаданий (в англ. заголовке почти всегда есть core-термин на 30,
# в русской регуляторной/рыночной новости часто только «реклама» = 10). А главное —
# RU-фиды это 3 курируемых первоисточника, а не 100-item сборник, поэтому грубую
# отбраковку на L1 не нужно делать агрессивной: решает семантический GLM (уровень 2).
score_threshold: 10
